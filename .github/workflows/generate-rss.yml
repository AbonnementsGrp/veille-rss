name: Générer les flux RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
  push:
    branches: ["main"]
    paths:
      - "generate.py"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/generate-rss.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Générer les flux
        run: python generate.py

      - name: Enregistrer les flux et l'historique
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public data/history.json
          git diff --cached --quiet || git commit -m "Mise à jour automatique des flux RSS"
          git push

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer le contenu Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publier sur GitHub Pages
        uses: actions/deploy-pages@v4
